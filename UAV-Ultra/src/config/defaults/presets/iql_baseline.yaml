algorithm: iql
description: "5090 tuned preset: train_iql.py"
source: "UAV-Ultra/docs/5090-服务器后台训练命令.md"
env: {}
algo:
  n_episode: 3000
  n_steps: null
  num_envs: 16
  batch_size: 512
  buffer_capacity: 200000
  learn_every: 4
  updates_per_learn: 1
  seed: 0
  device: auto
  use_amp: true
  start_method: fork
  loss_log_every: 1
  gamma: 0.99
  target_update_interval: 200
  lr_actor: 0.001
  lr_q: 0.001
  max_grad_norm: 10.0
  epsilon_start: 1.0
  epsilon_min: 0.01
  epsilon_decay: 0.995

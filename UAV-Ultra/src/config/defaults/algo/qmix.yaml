# QMIX：DQN 族 + 可学习 mixer。
# 仅放算法增量字段；训练循环字段来自 train/default.yaml。
# lr_mixer: null 表示「与 lr_q 同值」，loader 会显式落定为 lr_q。
epsilon_start: 1.0
epsilon_min: 0.01
epsilon_decay: 0.995
lr_mixer: null
mixing_hidden_dim: 32
hypernet_hidden_dim: 64
value_target_clip: 1000.0
callbacks: []
value_expansion_alpha_model: 0.5
value_expansion_seq_len: 4
value_expansion_td_lambda: 0.8
value_expansion_rollout_k: 4
# Stage 7：WM concurrent / block-alternating + L_VC（默认对齐 baseline train_qmix_wm_alternating.py）
wm_block_qmix_episodes: 50
wm_block_wm_episodes: 50
wm_batch_size: 512
wm_updates_per_learn: 2
wm_vc_eta_max: 0.2
wm_vc_warmup_ep: 300
wm_vc_ramp_end_ep: 800
# Stage 9：baseline presets can override these to exact script defaults.
# The packaged default preserves current Ultra behavior: WM replay follows the
# trainer buffer capacity, WM lr remains 1e-3, and grad clipping is disabled.
wm_buffer_capacity: 200000
wm_hidden_dim: 256
wm_n_layers: 1
wm_stochastic_dim: 32
wm_kl_beta: 0.1
wm_free_nats: 1.0
wm_lr: 1.0e-3
wm_max_grad_norm: 0.0
# Stage 8：JP learning head（默认对齐 baseline train_qmix_wm_alternating_jammer_prediction.py）
jammer_history_len: 4
jammer_pred_hidden_dim: 64
jammer_aux_weight: 0.1
lr_jammer: null  # null → loader settle 为 lr_q
jammer_warmup_episodes: 200
use_jammer_feature: true
critic_stable_tau: 0.005
critic_stable_lr_scale: 1.0

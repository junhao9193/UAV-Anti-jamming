# Canonical environment configuration.
# Edit this file for default difficulty knobs, communication workload, jammer behavior,
# sensing/CSI noise, reward weights, and episode timing. `envs/config.py` loads defaults
# from this file instead of maintaining a duplicated Python default dictionary.

length: 500
width: 250
low_height: 60
high_height: 120

# Optional root seed for environment-private RNG streams.
# Use null to let each environment draw fresh entropy; vector workers pass explicit seeds.
env_seed: null

# Mobility noise model (Gauss-Markov), shared by UAVs and jammers:
# x_t = k*x_{t-1} + (1-k)*x_mean + sqrt(1-k^2)*N(0, sigma)
# x_mean is the fixed target motion value sampled when the entity is created.
# Larger k means smoother, more inertial motion; larger sigma means stronger random perturbations.
k: 0.8
sigma: 0.2

# Radio / link budget (dB units follow original code naming)
# Medium difficulty: narrower UAV power budget (max 30 vs old 36) so UAV cannot
# always brute-force through interference, and stronger jammer (55 vs old 50)
# so on-same-channel transmission usually fails.
uav_power_min: 23.0
uav_power_max: 30.0
jammer_power: 55
sig2_dB: -114
uavAntGain: 3
uavNoiseFigure: 9
jammerAntGain: 3
bandwidth: 1800000.0
# Scale factor for UAV-UAV interference term in SINR denominator (difficulty knob).
# Medium: 5x to penalize cluster-internal collisions more heavily.
uav_interference_scale: 5.0

# Timing (seconds)
# data_size is in **bits** (uav_rate is in bit/s). 0.8 MiB -> 0.8*1024^2*8 bits.
data_size: 6710886.4
# Tighten success condition slightly to avoid trivial success saturation.
t_Rx: 0.9
t_collect: 0.5
timestep: 0.2
# Fixed task horizon measured in env steps. One step is one communication timeslot.
max_episode_steps: 1000
jammer_start: 0.2
t_dwell: 2.28

# Scenario sizes
# Medium difficulty: 5 jammers vs 6 channels leaves only 1 clean channel on
# average → random policy sr drops well below 50%.
# n_jammer change is safe for existing .pth (only affects physics + jammer state
# space; model architecture is determined by n_channel and n_des only).
n_ch: 4
n_cm_for_a_ch: 2
n_jammer: 5
n_channel: 6
states_observed: 2

# Sensing error model
p_md: 0
p_fa: 0
pn0: 20

# Per-channel static loss offset (dB), length must equal n_channel.
# Positive => worse channel (more loss), negative => better channel.
channel_loss_db: [-2.0, -1.0, 0.0, 0.5, 1.0, 2.0]

# Link-level frequency selectivity (static across an entire run when seed is fixed).
# This is NOT fast fading (no per-step randomness); it just makes different links prefer different channels.
channel_selectivity_std_db: 2.0
channel_selectivity_seed: 0

# Fast fading (small-scale): temporally correlated Rayleigh via AR(1) on complex coefficients.
# Set `enable_fast_fading: false` to fall back to large-scale only.
enable_fast_fading: true
# Correlation coefficient per env step. 0 => i.i.d. Rayleigh each step, 0.9~0.99 => slowly varying.
fast_fading_rho: 0.95
# Optional RNG seed for reproducible fading within a run.
# Use `null` to derive a deterministic private seed from the worker/global seed when available.
fast_fading_seed: null
# Numerical epsilon for log10(|h|+eps)
fast_fading_eps: 1.0e-12
# Optional clipping on fast_fading_db = 20*log10(|h|) to avoid extreme Rayleigh tails.
# Note: `fast_fading_rho` is the correlation of complex h_t, not of the dB value after log().
fast_fading_db_clip_low: -30.0
fast_fading_db_clip_high: 10.0

# Spectrum sensing (continuous energy map)
sensing_w_jammer: 1.0
sensing_w_uav: 0.8
# Sensing noise (medium difficulty): agent's channel-occupancy estimate is noisy.
sensing_noise_std: 0.25

# Spectrum sensing range clipping (meters). Tightened for medium difficulty so
# each cluster only observes nearby jammers / cluster heads (partial info).
sensing_jammer_range: 150.0
sensing_uav_range: 120.0

# Cluster geometry constraints
max_distance1: 99
max_distance2: 1

# Jammer behavior: Markov transition matrix plus optional reactive bias.
is_jammer_moving: true
# Fix Markov transition matrix generation across runs (for fair IQL vs QMIX comparison).
p_trans_seed: 0
# Markov base preference: each row gets this many preferred next joint states.
p_trans_preferred_next_states: 2
# Added weight per preferred next joint state, as a multiple of that row's pre-normalization sum.
p_trans_preference_strength: 0.5
# Reactive bias: >0 makes jammer prefer next-states overlapping with observed UAV channels.
# Medium difficulty: stronger reactive response (1.5) so jammer is harder to evade.
# 0.0 => pure Markov base preferences only (no reaction).
jammer_reactive_beta: 1.5
# Number of recent partially observed UAV-channel sets used by the reactive jammer.
# 1 preserves instantaneous reactive behavior; 4 is the default memoryful jammer.
jammer_memory_window: 4
# Per-link probability that a reactive jammer observes each UAV channel choice.
# Medium difficulty: jammer sees 70% of UAV channel choices each step.
jammer_reactive_observe_prob: 0.7
# Optional RNG seed for jammer state sampling and partial observation masks.
# Use `null` to derive a deterministic private seed from the worker/global seed when available.
jammer_seed: null

# Reward weights
reward_energy_weight: 1.0  # applied to normalized energy in [0,1]
reward_jump_weight: 0.1

# Fairness (team penalty): if any cluster's success rate < threshold, penalize the whole team.
# Per-cluster success rate is (#successful links)/n_des in the current step.
fairness_min_success_rate: 0.5
fairness_weight: 1.0

# State normalization (CSI from pathloss)
csi_pathloss_offset: 80.0
csi_pathloss_scale: 60.0
# Gaussian observation noise added after CSI normalization.
# Medium difficulty: 3x noisier CSI estimate so agent can't blindly trust pathloss feature.
csi_noise_std: 0.15
csi_clip: true

# ===== Stage 3.5 移动控制扩展（默认 = baseline 行为）=====
# UAV 簇头运动控制：gauss_markov（默认，与 baseline 等价） | policy（动作驱动）
uav_mobility_control: gauss_markov
# 干扰机运动模型：gauss_markov（默认，等价 baseline） | uav_guided_markov（朝最近 CH 偏置）
jammer_mobility_model: gauss_markov
# policy 模式下每步 mobility delta 的上界（默认 0 = 关闭；启用 policy 时必须 > 0）
uav_velocity_delta_max: 0.0
uav_direction_delta_max: 0.0
uav_p_delta_max: 0.0
# uav_guided_markov 引导强度：0.0 = 等价 baseline，1.0 = 完全朝向最近 CH
jammer_guidance_strength: 0.0
# 观测层是否额外暴露 CH 自身位置 / 速度 / 方向（policy 训练需要时打开）
observation_include_mobility: false
# 移动相关 reward 形状（默认 0 = 不影响 baseline）
mobility_oob_penalty_weight: 0.0
mobility_energy_weight: 0.0
